<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Canciones que me recuerdan a ti 💖 | Apple Style</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PARTICLE BACKGROUND -->
  <div class="particle-bg" id="particleBg"></div>

  <!-- HEADER FLOTANTE -->
  <header class="app-header" id="appHeader">
    <div class="header-content">
      <div class="logo">
        🎵 Nuestras Canciones <span>· ❤️(👑✨)</span>
      </div>
      <div class="header-right">
        <img src="https://ui-avatars.com/api/?background=ff5e7e&color=fff&rounded=true&bold=true&size=32&name=❤️" alt="Avatar" class="avatar">
      </div>
    </div>
  </header>

  <!-- LAYOUT PRINCIPAL -->
  <div class="main-layout">
    
    <!-- COLUMNA IZQUIERDA: REPRODUCTOR -->
    <div class="left-column">
      <h1 class="hero-title">Canciones que me<br>recuerdan a ti 🤍</h1>
      
      <div class="player-card">
        <div class="player-cover-wrapper">
          <img id="currentCover" src="Fotos/1200x1200bf-60.jpg" alt="Portada" class="player-cover">
        </div>
        <div class="player-info">
          <h2 id="currentSong">Si No Estás</h2>
          <p class="artist" id="currentArtist">Iñigo Quintero</p>
          <p class="album" id="currentAlbum">Balada · 2023</p>
        </div>
        
        <button class="play-btn" id="playPauseBtn">
          <span class="play-icon">▶</span>
        </button>
        
        <div class="progress-container">
          <span class="time" id="currentTime">0:00</span>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="time" id="duration">0:00</span>
        </div>
        
        <div class="controls">
          <span class="control-icon" id="prevBtn">⏮</span>
          <span class="control-icon" id="nextBtn">⏭</span>
          <div class="volume-control">
            <span class="control-icon" id="volumeIcon">🔊</span>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
          </div>
        </div>
      </div>
    </div>

    <!-- COLUMNA CENTRAL: LETRAS KARAOKE -->
    <div class="lyrics-column">
      <div class="lyrics-title">🎤 LETRA</div>
      <div id="lyricsContainer" class="lyrics-container">
        <div class="lyrics-placeholder">▶ Presiona play para ver la letra</div>
      </div>
    </div>

    <!-- COLUMNA DERECHA: LISTA DE CANCIONES -->
    <div class="sidebar">
      <h3>Todas las canciones</h3>
      <div id="snippetsList"></div>
    </div>
  </div>

  <!-- CORAZÓN ANIMADO -->
  <div class="heart-beat" id="heartBeat">❤️</div>

  <!-- NOTIFICACIÓN FLOTANTE -->
  <div id="floatingNotification" class="floating-notification">✨ Reproduciendo...</div>

  <footer>
    Hecho con amor para ti 🤍 · TupececitoFav · Tu Peluchito 🐻
  </footer>

  <audio id="audioPlayer"></audio>
  <script src="script.js"></script>
</body>
</html>
