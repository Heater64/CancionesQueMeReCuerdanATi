<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canciones que me recuerdan a ti 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER SIMPLE (sin menú innecesario) -->
  <header class="simple-header">
    <div class="logo">🎶 Tu Playlist Romántica 💖</div>
    <div class="nav-right">
      <img src="https://via.placeholder.com/38x38" alt="Avatar" class="avatar">
    </div>
  </header>

  <!-- LAYOUT PRINCIPAL (3 columnas) -->
  <div class="main-layout">
    
    <!-- COLUMNA IZQUIERDA: Reproductor -->
    <div class="left-column">
      <h1 class="hero-title">Canciones que me recuerdan a ti 🤍</h1>
      
      <div class="player-card">
        <img id="currentCover" src="Fotos/1200x1200bf-60.jpg" alt="Portada" class="player-cover">
        <div class="player-info">
          <h2 id="currentSong">Si No Estás</h2>
          <p class="artist" id="currentArtist">Iñigo Quintero</p>
          <p class="album" id="currentAlbum">Balada • 2023</p>
        </div>
        
        <button class="play-btn" id="playPauseBtn">
          <span class="play-icon">▶</span>
        </button>
        
        <div class="progress-container">
          <span class="time" id="currentTime">0:00</span>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="time" id="duration">0:00</span>
        </div>
        
        <div class="controls">
          <span class="control-icon" id="prevBtn">⏮</span>
          <span class="control-icon" id="nextBtn">⏭</span>
          <span class="control-icon" id="volumeIcon">🔊</span>
          <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
        </div>
      </div>
    </div>

    <!-- COLUMNA CENTRAL: Letras -->
    <div class="lyrics-column">
      <div class="lyrics-title">🎤 Letra en vivo</div>
      <div id="lyricsContainer" class="lyrics-container">
        <div class="lyrics-placeholder">▶ Presiona play para ver la letra</div>
      </div>
    </div>

    <!-- COLUMNA DERECHA: Lista de canciones -->
    <div class="sidebar">
      <h3>Todas las canciones</h3>
      <div id="snippetsList"></div>
    </div>
  </div>

  <footer>
    Hecho con amor para ti 🤍<br>TupececitoFav - Tu Peluchito 🐻
  </footer>

  <audio id="audioPlayer"></audio>
  <script src="script.js"></script>
</body>
</html>
